name: Generate and Sign SBOMs

on:
  workflow_dispatch:
  push:
    branches: [ "main" ]

env:
  REGISTRY: ghcr.io
  IMAGE_NAME: ${{ github.repository }}

jobs:
  # Job 1: SBOM da Aplicação (Maven/CycloneDX)
  sbom-app:
    runs-on: ubuntu-latest
    permissions:
      contents: read
      packages: read
      id-token: write
      
    steps:
      - name: Checkout code
        uses: actions/checkout@v4
        
      - name: Set up Java
        uses: actions/setup-java@v4
        with:
          distribution: "temurin"
          java-version: "21"

      # Gerar SBOM usando o plugin CycloneDX para Maven
      - name: Generate SBOM (Application)
        run: mvn -B org.cyclonedx:cyclonedx-maven-plugin:2.8.0:makeAggregateBom

      - name: Install cosign
        uses: sigstore/cosign-installer@v3

      # Assinar o ficheiro bom.json gerado
      - name: Sign SBOM Application
        run: |
          cosign sign-blob \
            --yes \
            target/bom.json \
            --output-signature sbom-application.sig \
            --output-certificate sbom-application.crt

      - name: Upload SBOM Application (+sig +crt)
        uses: actions/upload-artifact@v4
        with:
          name: sbom-application
          path: |
            target/bom.json
            sbom-application.sig
            sbom-application.crt

  # Job 2: SBOM da Imagem Docker (Trivy)
  sbom-image:
    runs-on: ubuntu-latest
    needs: sbom-app # Opcional: define dependência entre os jobs
    permissions:
      contents: read
      packages: write
      id-token: write

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Install cosign
        uses: sigstore/cosign-installer@v3

      - name: Extract Docker metadata
        id: meta
        uses: docker/metadata-action@v5
        with:
          images: ${{ env.REGISTRY }}/${{ env.IMAGE_NAME }}
      
      # Build para AMD64 para permitir o scan local da imagem
      - name: Build Docker image
        id: build
        uses: docker/build-push-action@v5
        with:
          context: .
          file: ./Dockerfile
          tags: ${{ steps.meta.outputs.tags }}
          labels: ${{ steps.meta.outputs.labels }}
          platforms: linux/amd64
          push: false
          load: true
      
      # Gerar SBOM da imagem usando Trivy
      - name: Generate SBOM (Docker image)
        uses: aquasecurity/trivy-action@0.56.1
        with:
          image-ref: ${{ fromJSON(steps.meta.outputs.json).tags[0] }}
          format: cyclonedx
          output: sbom-image.cdx.json


      # Assinar o SBOM da imagem
      - name: Sign SBOM Docker Image
        run: |
          cosign sign-blob \
            --yes \
            sbom-image.cdx.json \
            --output-signature sbom-image.sig \
            --output-certificate sbom-image.crt

      - name: Upload SBOM Image (+sig +crt)
        uses: actions/upload-artifact@v4
        with:
          name: sbom-image
          path: |
            sbom-image.cdx.json
            sbom-image.sig
            sbom-image.crt