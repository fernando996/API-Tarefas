sbom-image:
    runs-on: ubuntu-latest
    permissions:
      contents: read
      packages: write
      id-token: write

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Install cosign
        uses: sigstore/cosign-installer@v3

      - name: Extract Docker metadata
        id: meta
        uses: docker/metadata-action@v5
        with:
          images: ${{ env.REGISTRY }}/${{ env.IMAGE_NAME }}
      
      # Build for AMD64 (to generate SBOM)
      - name: Build Docker image
        id: build
        uses: docker/build-push-action@v5
        with:
          context: .
          file: ./Dockerfile
          tags: ${{ steps.meta.outputs.tags }}
          labels: ${{ steps.meta.outputs.labels }}
          platforms: linux/amd64
          push: false
          load: true
      
      - name: Generate SBOM (Docker image)
        uses: aquasecurity/trivy-action@0.33.1
        with:
          image-ref: ${{ steps.meta.outputs.tags }}
          format: cyclonedx
          output: sbom-image.cdx.json

      - name: Sign SBOM Docker Image
        run: |
          cosign sign-blob \
            --yes \
            sbom-image.cdx.json \
            --output-signature sbom-image.sig \
            --output-certificate sbom-image.crt

      - name: Upload SBOM Image (+sig +crt)
        uses: actions/upload-artifact@v4
        with:
          name: sbom-image
          path: |
            sbom-image.cdx.json
            sbom-image.sig
            sbom-image.crt
